[pytest]
minversion = 7.0
addopts =
    -ra
    --strict-markers
    --strict-config
    --alluredir=.results
    --clean-alluredir

testpaths =
    tests

python_files =
    test_*.py

python_classes =
    Test*

python_functions =
    test_*

markers =
    smoke: smoke tests
    regression: regression tests
    api: api tests
    ui: ui tests
    slow: slow tests

asyncio_mode = auto